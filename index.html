<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kamentukash Pro - Final</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="logo.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KScan">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { 
            --primary: #0056b3; --success: #2e7d32; --warning: #f39c12; --error: #d32f2f; 
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d7e1ec 100%); 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gradient); text-align: center; min-height: 100vh; overflow-x: hidden; }
        
        #status-bar { display: flex; align-items: center; justify-content: center; padding: 12px; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.85rem; font-weight: 600; position: sticky; top: 0; z-index: 10; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; margin-right: 8px; }
        .online { background: #4CAF50 !important; box-shadow: 0 0 8px #4CAF50; }

        .glass-card { background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 25px; margin: 20px auto; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .input-inscription { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-save { width: 100%; padding: 15px; border-radius: 15px; background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; }
        .btn-save:disabled { background: #6c757d; cursor: not-allowed; }
        
        .btn-scan { width: 180px; height: 180px; border-radius: 50%; background: var(--primary); color: white; border: 8px solid rgba(255,255,255,0.5); font-weight: bold; font-size: 1.1rem; box-shadow: 0 15px 35px rgba(0, 86, 179, 0.3); cursor: pointer; }
        .btn-next { width: 100%; padding: 18px; border-radius: 15px; background: #212529; color: white; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }

        #login-screen { height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #home-screen { display: none; height: 80vh; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        #search-trigger { margin-top: 15px; color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; }
        .item-recherche { padding: 15px; border-bottom: 1px solid #eee; text-align: left; cursor: pointer; background: white; }
        .item-recherche:active { background: #f1f1f1; }

        #reader-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(8px); }
        #result-card, #search-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; padding: 25px; border-radius: 30px; background: white; z-index: 210; text-align: center; }
        .badge { display: inline-block; padding: 12px 24px; border-radius: 15px; color: white; font-weight: bold; margin: 15px 0; text-transform: uppercase; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 10px; }
    
        #info-surveillant {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            color: var(--primary);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }
        #info-surveillant:active { transform: scale(0.95); }

        /* Style des nouveaux compteurs */
        .compteur-periode {
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
            cursor: pointer;
            flex: 1;
            min-width: 80px;
        }
        .compteur-label { font-size: 0.65rem; color: #666; font-weight: 600; display: block; }
        .compteur-valeur { color: var(--primary); font-size: 1.2rem; font-weight: 800; }

        .illustration-bas {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 400px;
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }

        #landscape-lock {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0056b3;
            color: white;
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @media (orientation: landscape) {
            #landscape-lock { display: flex; }
            body { overflow: hidden; }
        }
    </style>
</head>
<body>
<div id="landscape-lock">
    <div style="font-size: 50px; margin-bottom: 20px;">🔄</div>
    <h2 style="margin: 0;">Mode Portrait Requis</h2>
    <p>Merci de redresser votre appareil pour utiliser KScan.</p>
</div>
<audio id="audio-bip" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<div id="status-bar">
    <div id="status-dot"></div> <span id="status-text">Initialisation...</span>
</div>

<div id="login-screen">
    <div class="glass-card">
        <h2 style="margin:0;">Bienvenue</h2>
        <p style="color: #666;">Qui est surveillant aujourd'hui ?</p>
        <select id="select-surveillant" style="width:100%; padding:12px; border-radius:10px; margin:15px 0;">
            <option value="">Chargement...</option>
        </select>
        <button class="btn-save" id="btn-entrer" onclick="validerSurveillant()" style="display:none; background:var(--primary);">ENTRER</button>
    </div>
</div>

<div id="home-screen">
    <div id="info-surveillant" onclick="resetSurveillant()"></div>
    
    <button class="btn-scan" onclick="startScan()">📷<br><br>SCANNER</button>

    <div id="search-trigger" onclick="ouvrirRecherche()">
        <span>🔍</span> AJOUT MANUEL
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: center; gap: 8px; width: 90%; max-width: 400px;">
        <div class="compteur-periode" onclick="afficherListePresents('MATIN')">
            <span class="compteur-label">MATIN</span>
            <span id="nb-matin" class="compteur-valeur">0</span>
        </div>
        <div class="compteur-periode" onclick="afficherListePresents('MIDI')">
            <span class="compteur-label">MIDI</span>
            <span id="nb-midi" class="compteur-valeur">0</span>
        </div>
        <div class="compteur-periode" onclick="afficherListePresents('SOIR')">
            <span class="compteur-label">SOIR</span>
            <span id="nb-soir" class="compteur-valeur">0</span>
        </div>
    </div>
</div>

<div id="reader-container">
    <div id="reader" style="width: 100%; height: 100%;"></div>
    <button onclick="stopScan()" style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); padding:15px 40px; border-radius:50px; background:red; color:white; border:none; z-index:101; font-weight:bold;">ANNULER</button>
</div>

<div id="search-modal-overlay" class="overlay" onclick="fermerRecherche()"></div>
<div id="search-modal">
    <h3>Ajout Manuel</h3>
    <button class="btn-save" style="background:#6f42c1; margin-bottom:15px; border:none; color:white;" onclick="preparerNouvelInvite()">
        + AJOUTER UN INVITÉ
    </button>
    <button class="btn-save" style="background: #2c3e50; margin-bottom: 15px; border:none; color:white;" onclick="preparerGroupeInvites()">
        + AJOUTER UN GROUPE
    </button>
    <input type="text" id="input-recherche" class="input-inscription" placeholder="Nom ou Prénom..." onkeyup="filtrerRecherche()">
    <div id="liste-resultats" style="max-height: 250px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 10px;"></div>
    <button class="btn-next" style="background:#ccc;" onclick="fermerRecherche()">RETOUR</button>
</div>

<div id="overlay" class="overlay"></div>
<div id="result-card"></div>
<img src="https://raw.githubusercontent.com/amoisan1/kamentukash-scan/main/image-bas.webp" class="illustration-bas" alt="Décoration Archer" loading="lazy">
<div id="version-display" style="position: fixed; bottom: 5px; right: 10px; font-size: 0.7rem; color: #999; z-index: 1000; font-family: monospace;">Chargement version...</div>

<div id="presents-modal-overlay" class="overlay" onclick="fermerListePresents()"></div>
<div id="presents-modal">
    <h3 id="presents-modal-titre">Présents</h3>
    <div id="liste-presents-details" style="max-height: 300px; overflow-y: auto; margin: 15px 0; border: 1px solid #eee; border-radius: 10px; text-align: left;"></div>
    <button class="btn-next" onclick="fermerListePresents()">FERMER</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQOsi7pSMMRN_Tyw24vHFHcmlCI6HH_6fz0N8kDw81jL_sq1AH0xXBrEbj-9shFte/exec";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";
    const GITHUB_USER = "amoisan1";
    const GITHUB_REPO = "kamentukash-scan";

    let html5QrCode, membresCache = [], surveillantActif = "";
    
    // Remplacement du Set unique par un objet de périodes
    let presencesParPeriode = { "MATIN": new Set(), "MIDI": new Set(), "SOIR": new Set() };
    
    let modeRechercheManuelle = false;
    let fileAttenteScans = JSON.parse(localStorage.getItem('file_attente') || '[]'), isSyncing = false;

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('Erreur SW:', err));
        });
    }

    window.onload = initialiser;

    function getPeriodeActuelle() {
        const h = new Date().getHours();
        if (h >= 7 && h < 12) return "MATIN";
        if (h >= 12 && h < 17) return "MIDI";
        if (h >= 17) return "SOIR";
        return "SOIR"; // Par défaut
    }

    async function initialiser() {
        fetchGithubVersion();
        const localData = localStorage.getItem('membres_cache');
        if (localData) {
            membresCache = JSON.parse(localData);
            document.getElementById('status-text').innerText = membresCache.length + " membres (Local)";
            document.getElementById('status-dot').style.backgroundColor = "#ffa500";
        }
        const garde = localStorage.getItem('surveillant_nom');
        if (garde) {
            surveillantActif = garde;
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('home-screen').style.display = "flex";
            document.getElementById('info-surveillant').innerText = "Surveillant : " + surveillantActif;
        }
        try {
            const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?action=getSurveillants"));
            const data = await resp.json();
            const select = document.getElementById('select-surveillant');
            if (select) {
                select.innerHTML = '<option value="">-- Choisir --</option>';
                data.forEach(n => { let o = document.createElement('option'); o.value = n; o.innerText = n; select.appendChild(o); });
                document.getElementById('btn-entrer').style.display = "flex";
            }
        } catch (e) {}
        syncMembres();
        traiterFileAttente();
    }

    async function syncMembres() {
        try {
            const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?action=sync"));
            const data = await resp.json();
            if (data && data.membres) {
                membresCache = data.membres;
                localStorage.setItem('membres_cache', JSON.stringify(data.membres));

                // Distribution des IDs reçus dans les bons tiroirs
                presencesParPeriode["MATIN"] = new Set(data.presentsIds.MATIN || []);
                presencesParPeriode["MIDI"] = new Set(data.presentsIds.MIDI || []);
                presencesParPeriode["SOIR"] = new Set(data.presentsIds.SOIR || []);

                actualiserCompteurs();
                document.getElementById('status-text').innerText = membresCache.length + " membres sync";
                document.getElementById('status-dot').classList.add('online');
            }
        } catch (e) { document.getElementById('status-text').innerText = "Mode Hors-ligne"; }
    }

    function actualiserCompteurs() {
        document.getElementById('nb-matin').innerText = presencesParPeriode["MATIN"].size;
        document.getElementById('nb-midi').innerText = presencesParPeriode["MIDI"].size;
        document.getElementById('nb-soir').innerText = presencesParPeriode["SOIR"].size;
    }

    function validerMembre(m) {
        const p = getPeriodeActuelle();
        const estUnDoublon = presencesParPeriode[p].has(m.id);
        showResult(m, estUnDoublon);
        
        envoyerScan({ code: m.id, surveillant: surveillantActif, timestamp: new Date().toISOString() });
        
        if (!estUnDoublon) {
            presencesParPeriode[p].add(m.id);
            actualiserCompteurs();
        }
    }

    function afficherListePresents(periode) {
        document.getElementById('presents-modal-titre').innerText = "Présents - " + periode;
        const container = document.getElementById('liste-presents-details');
        container.innerHTML = '';
        const setPresents = presencesParPeriode[periode];

        if (!setPresents || setPresents.size === 0) {
            container.innerHTML = '<p style="padding:15px; color:#999;">Aucun présent.</p>';
        } else {
            let listeTriee = [];
            setPresents.forEach(id => {
                const m = membresCache.find(x => x.id === id);
                listeTriee.push(m ? m : { id: id, prenom: "INVITÉ", nom: "(" + id.slice(-4) + ")" });
            });
            listeTriee.sort((a, b) => a.prenom.localeCompare(b.prenom));
            listeTriee.forEach(m => {
                const div = document.createElement('div');
                div.style.padding = "12px 15px"; div.style.borderBottom = "1px solid #f0f0f0";
                div.style.display = "flex"; div.style.justifyContent = "space-between"; div.style.alignItems = "center";
                div.innerHTML = `<div><div style="font-weight:bold;">${m.prenom} ${m.nom}</div><div style="font-size:0.75rem;color:#888;">${m.id}</div></div>
                                 <div onclick="demanderSuppression('${m.id}', '${m.prenom} ${m.nom}', '${periode}')" style="font-size:0.7rem; color:var(--error); font-weight:bold; cursor:pointer; padding:5px 10px; border:1px solid var(--error); border-radius:8px;">EFFACER</div>`;
                container.appendChild(div);
            });
        }
        document.getElementById('presents-modal-overlay').style.display = 'block';
        document.getElementById('presents-modal').style.display = 'block';
    }

    function demanderSuppression(id, nomComplet, periode) {
        fermerListePresents();
        const card = document.getElementById('result-card');
        card.innerHTML = "";
        card.style.borderTop = "10px solid var(--error)";
        card.innerHTML = `<h3>Retirer ?</h3><p>Enlever <strong>${nomComplet}</strong> de la liste <strong>${periode}</strong> ?</p>
            <button class="btn-save" style="background:var(--error); margin-bottom:10px;" onclick="retirerPresence('${id}', '${periode}')">OUI, EFFACER</button>
            <button class="btn-next" style="background:#ccc;" onclick="closeCard()">ANNULER</button>`;
        document.getElementById('overlay').style.display = "block";
        card.style.display = "block";
    }

    async function retirerPresence(id, periode) {
        const card = document.getElementById('result-card');
        card.innerHTML = `<div style="padding:20px;"><span class="spinner" style="border-top-color:var(--error)"></span><br><br>Suppression...</div>`;
        try {
            await fetch(PROXY + encodeURIComponent(`${SCRIPT_URL}?action=supprimer&code=${encodeURIComponent(id)}&surveillant=${encodeURIComponent(surveillantActif)}`));
            presencesParPeriode[periode].delete(id);
            actualiserCompteurs();
            closeCard();
        } catch (e) { alert("Erreur connexion"); closeCard(); }
    }

    // --- Fonctions de base conservées ---
    function stopScan() { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().then(() => document.getElementById('reader-container').style.display = 'none'); else document.getElementById('reader-container').style.display = 'none'; }
    function startScan() { document.getElementById('reader-container').style.display = 'block'; if (!html5QrCode) html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess).catch(e => alert("Caméra bloquée")); }
    function onScanSuccess(text) { document.getElementById('audio-bip').play(); if (navigator.vibrate) navigator.vibrate(80); stopScan(); const id = text.trim().toUpperCase(); const m = membresCache.find(x => x.id === id); if (m) validerMembre(m); else if (id.includes("KAM")) showResult({ id: id, etat: "NOUVEAU" }); else alert("Code inconnu"); }
    function closeCard() { document.getElementById('overlay').style.display = 'none'; document.getElementById('result-card').style.display = 'none'; }
    function fermerRecherche() { document.getElementById('search-modal-overlay').style.display = 'none'; document.getElementById('search-modal').style.display = 'none'; }
    function fermerListePresents() { document.getElementById('presents-modal-overlay').style.display = 'none'; document.getElementById('presents-modal').style.display = 'none'; }
    function validerSurveillant() { const v = document.getElementById('select-surveillant').value; if (!v) return; surveillantActif = v; localStorage.setItem('surveillant_nom', v); location.reload(); }
    function resetSurveillant() { localStorage.removeItem('surveillant_nom'); location.reload(); }
    function ouvrirRecherche() { document.getElementById('search-modal-overlay').style.display = 'block'; document.getElementById('search-modal').style.display = 'block'; document.getElementById('input-recherche').focus(); filtrerRecherche(); }
    function confirmermembreManuel(m) { fermerRecherche(); showResult(m, presencesParPeriode[getPeriodeActuelle()].has(m.id), true); }
    
    // --- Inscriptions ---
    async function sauvegarderMembre(id) {
        const p = document.getElementById('ins-prenom').value.trim(), n = document.getElementById('ins-nom').value.trim();
        if(!p || !n) return;
        const btn = document.getElementById('btn-save-action');
        btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>...';
        try {
            await fetch(PROXY + encodeURIComponent(`${SCRIPT_URL}?action=inscrire&id=${id}&prenom=${p}&nom=${n}&surveillant=${surveillantActif}`));
            membresCache.push({ id, prenom: p, nom: n, etat: "non-confirmé" });
            localStorage.setItem('membres_cache', JSON.stringify(membresCache));
            const per = getPeriodeActuelle();
            presencesParPeriode[per].add(id);
            actualiserCompteurs();
            closeCard();
        } catch (e) { btn.disabled = false; }
    }

    async function sauvegarderInvite(id) {
        const p = document.getElementById('ins-prenom').value.trim(), n = document.getElementById('ins-nom').value.trim();
        if(!p || !n) return;
        const btn = document.getElementById('btn-save-invite');
        btn.disabled = true;
        try {
            await fetch(PROXY + encodeURIComponent(`${SCRIPT_URL}?action=inscrire&id=${id}&prenom=${p}&nom=${n}&surveillant=${surveillantActif}&statut=INVITÉ`));
            const per = getPeriodeActuelle();
            presencesParPeriode[per].add(id);
            actualiserCompteurs();
            closeCard();
        } catch (e) { btn.disabled = false; }
    }

    async function validerAjoutGroupe() {
        const q = parseInt(document.getElementById('input-quantite-groupe').value);
        if(isNaN(q) || q < 1) return;
        const per = getPeriodeActuelle();
        for (let i = 1; i <= q; i++) {
            const uid = `KAM-ID-9999-G${Date.now().toString().slice(-4)}${i}`;
            await fetch(PROXY + encodeURIComponent(`${SCRIPT_URL}?action=inscrire&id=${uid}&prenom=Groupe&nom=Pers.${i}&surveillant=${surveillantActif}&statut=INVITÉ`));
            presencesParPeriode[per].add(uid);
        }
        actualiserCompteurs(); closeCard();
    }

    // --- Utilitaires restants ---
    function filtrerRecherche() {
        const val = document.getElementById('input-recherche').value.toLowerCase();
        const container = document.getElementById('liste-resultats');
        container.innerHTML = '';
        membresCache.filter(m => m.prenom.toLowerCase().includes(val) || m.nom.toLowerCase().includes(val))
            .sort((a,b) => a.prenom.localeCompare(b.prenom)).slice(0,20).forEach(m => {
                const div = document.createElement('div'); div.className = 'item-recherche';
                div.innerHTML = `<strong>${m.prenom} ${m.nom}</strong><br><small>${m.id}</small>`;
                div.onclick = () => confirmermembreManuel(m); container.appendChild(div);
            });
    }

    function showResult(m, dejaPresent = false, demandeConfirmation = false) {
        const card = document.getElementById('result-card'); card.innerHTML = "";
        if (m.etat === "NOUVEAU") {
            card.style.borderTop = "10px solid var(--primary)";
            card.innerHTML = `<h3>Carte Vierge</h3><p>ID: ${m.id}</p><input type="text" id="ins-prenom" class="input-inscription" placeholder="Prénom"><input type="text" id="ins-nom" class="input-inscription" placeholder="Nom"><button id="btn-save-action" class="btn-save" onclick="sauvegarderMembre('${m.id}')">ENREGISTRER</button><button class="btn-next" style="background:#ccc;" onclick="closeCard()">ANNULER</button>`;
        } else {
            const color = m.etat === "actif" ? "var(--success)" : "var(--warning)";
            card.style.borderTop = "10px solid " + color;
            card.innerHTML = `${dejaPresent ? '<div style="color:orange;font-weight:bold;">⚠️ DÉJÀ SCANNÉ</div>' : ''}<h2>${m.prenom} ${m.nom}</h2><div class="badge" style="background:${color}">${m.etat}</div><p>${m.id}</p>` + 
                (demandeConfirmation ? `<button class="btn-save" onclick="validerMembreManuel('${m.id}')">CONFIRMER</button>` : `<button class="btn-next" onclick="closeCard()">SUIVANT</button>`);
        }
        document.getElementById('overlay').style.display = "block"; card.style.display = "block";
    }

    function validerMembreManuel(id) { const m = membresCache.find(x => x.id === id); if(m) validerMembre(m); closeCard(); }

    async function envoyerScan(d) { try { await fetch(PROXY + encodeURIComponent(`${SCRIPT_URL}?code=${d.code}&surveillant=${d.surveillant}`), {mode:'no-cors'}); } catch(e){}}
    function preparerNouvelInvite() { fermerRecherche(); const uid = "KAM-INV-"+Date.now().toString().slice(-4); const card = document.getElementById('result-card'); card.style.borderTop = "10px solid #6f42c1"; card.innerHTML = `<h3>Nouvel Invité</h3><input type="text" id="ins-prenom" class="input-inscription" placeholder="Prénom"><input type="text" id="ins-nom" class="input-inscription" placeholder="Nom"><button id="btn-save-invite" class="btn-save" style="background:#6f42c1;" onclick="sauvegarderInvite('${uid}')">VALIDER</button><button class="btn-next" style="background:#ccc;" onclick="closeCard()">ANNULER</button>`; document.getElementById('overlay').style.display = "block"; card.style.display = "block"; }
