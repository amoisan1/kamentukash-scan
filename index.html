<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kamentukash Scan Pro - FIX FINAL</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --primary: #0056b3; --success: #2e7d32; --warning: #f39c12; --error: #d32f2f; 
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d7e1ec 100%); 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gradient); text-align: center; min-height: 100vh; }
        #status-bar { display: flex; align-items: center; justify-content: center; padding: 12px; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.85rem; font-weight: 600; position: sticky; top: 0; z-index: 10; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; margin-right: 8px; }
        .online { background: #4CAF50 !important; box-shadow: 0 0 8px #4CAF50; }
        .glass-card { background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 25px; margin: 20px auto; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .input-inscription { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-save { width: 100%; padding: 15px; border-radius: 15px; background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #login-screen { height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .select-style { width: 100%; max-width: 280px; padding: 15px; border-radius: 12px; border: 2px solid #ced4da; margin: 20px 0; font-size: 1rem; }
        #home-screen { display: none; height: 80vh; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .btn-scan { width: 180px; height: 180px; border-radius: 50%; background: var(--primary); color: white; border: 8px solid rgba(255,255,255,0.5); font-weight: bold; font-size: 1.1rem; box-shadow: 0 15px 35px rgba(0, 86, 179, 0.3); }
        #reader-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(8px); }
        #result-card { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; padding: 30px; border-radius: 30px; background: white; z-index: 210; text-align: center; }
        .badge { display: inline-block; padding: 12px 24px; border-radius: 15px; color: white; font-weight: bold; margin: 15px 0; text-transform: uppercase; }
        .btn-next { width: 100%; padding: 18px; border-radius: 15px; background: #212529; color: white; border: none; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<audio id="audio-bip" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>
<div id="status-bar">
    <div id="status-dot"></div> <span id="status-text">Initialisation...</span>
</div>

<div id="login-screen">
    <div class="glass-card">
        <h2 style="margin:0;">Bienvenue</h2>
        <p style="color: #666;">Qui est surveillant aujourd'hui ?</p>
        <select id="select-surveillant" class="select-style">
            <option value="">Chargement des noms...</option>
        </select>
        <button class="btn-save" id="btn-entrer" onclick="validerSurveillant()" style="display:none; background:var(--primary);">VALIDER ET ENTRER</button>
    </div>
</div>

<div id="home-screen">
    <div id="info-surveillant" style="background: white; padding: 10px 25px; border-radius: 50px; color: var(--primary); font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05);"></div>
    <div id="stats-container" style="background: #e9ecef; padding: 10px 20px; border-radius: 15px; font-size: 0.9rem; color: #495057; font-weight: bold;">
        👥 Présents aujourd'hui : <span id="nb-presents">0</span>
    </div>
	<button class="btn-scan" onclick="startScan()">📷<br><br>LANCER LE SCAN</button>
    <p style="color: #6c757d; font-size: 0.85rem; cursor: pointer; text-decoration: underline;" onclick="resetSurveillant()">🔄 Changer de surveillant</p>
</div>

<div id="reader-container">
    <div id="reader" style="width: 100%; height: 100%;"></div>
    <button onclick="stopScan()" style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); padding:15px 40px; border-radius:50px; background:red; color:white; border:none; z-index:101; font-weight:bold;">ANNULER</button>
</div>

<div id="overlay" class="overlay"></div>
<div id="result-card"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQOsi7pSMMQRN_Tyw24vHFHcmlCI6HH_6fz0N8kDw81jL_sq1AH0xXBrEbj-9shFte/exec";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";

    let html5QrCode;
    let membresCache = [];
	let presentsAujourdhui = new Set(); // Pour stocker les IDs uniques déjà scannés
    let surveillantActif = "";

    window.onload = initialiser;

    async function initialiser() {
        // 1. Gestion du surveillant
        const garde = localStorage.getItem('surveillant_nom');
        if (garde) {
            surveillantActif = garde;
            afficherHomeScreen();
        }

        // 2. Chargement sécurisé du cache
        try {
            const localData = localStorage.getItem('membres_cache');
            if (localData) {
                const parsed = JSON.parse(localData);
                // Si c'est l'ancien format (une liste directe), on l'ignore
                membresCache = Array.isArray(parsed) ? parsed : (parsed.membres || []);
                document.getElementById('status-text').innerText = membresCache.length + " membres (Local)";
            }
        } catch(e) { 
            localStorage.removeItem('membres_cache'); // Nettoyage si corrompu
        }

        // 3. Charger les surveillants
        fetchSurveillants();

        // 4. Lancer la synchro
        syncMembres();
    }

    async function fetchSurveillants() {
        try {
            const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?action=getSurveillants"));
            const data = await resp.json();
            const select = document.getElementById('select-surveillant');
            if(!select) return;
            select.innerHTML = '<option value="">-- Choisir --</option>';
            data.forEach(n => { let o = document.createElement('option'); o.value = n; o.innerText = n; select.appendChild(o); });
            document.getElementById('btn-entrer').style.display = "block";
        } catch (e) { console.error("Erreur surveillants"); }
    }

    async function syncMembres() {
		const txt = document.getElementById('status-text');
		try {
			const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?action=sync"));
			const data = await resp.json();
			
			// VERIFICATION CRUCIALE DU FORMAT
			if (data && data.membres) {
				// 1. Mise à jour de la liste des membres
				membresCache = data.membres;
				localStorage.setItem('membres_cache', JSON.stringify(data.membres));
				
				// 2. Initialisation du compteur de présence unique (Set)
				// On vide la liste locale et on la remplit avec le nombre venant du serveur
				presentsAujourdhui = new Set();
				const nbPresentsServeur = data.totalPresents || 0;
				
				// On crée des entrées factices pour que .size corresponde au chiffre du serveur
				for(let i = 0; i < nbPresentsServeur; i++) {
					presentsAujourdhui.add("DEJA_PRESENT_" + i);
				}

				// 3. Mise à jour de l'affichage
				document.getElementById('nb-presents').innerText = nbPresentsServeur;
				txt.innerText = membresCache.length + " membres synchronisés";
				document.getElementById('status-dot').classList.add('online');

			} else if (Array.isArray(data)) {
				// ANCIEN FORMAT DETECTÉ
				membresCache = data;
				localStorage.setItem('membres_cache', JSON.stringify(data));
				txt.innerText = data.length + " membres (Ancien Format)";
				document.getElementById('nb-presents').innerText = "?";
			}
		} catch (e) {
			txt.innerText = "Erreur de synchro / Hors-ligne";
			// En cas d'erreur, on essaie de charger le cache local s'il existe
			const local = localStorage.getItem('membres_cache');
			if(local) membresCache = JSON.parse(local);
		}
	}

    function validerSurveillant() {
        const val = document.getElementById('select-surveillant').value;
        if (!val) return alert("Veuillez choisir un nom");
        surveillantActif = val;
        localStorage.setItem('surveillant_nom', val);
        afficherHomeScreen();
    }

    function resetSurveillant() {
        localStorage.removeItem('surveillant_nom');
        location.reload();
    }

    function afficherHomeScreen() {
        document.getElementById('login-screen').style.display = "none";
        document.getElementById('home-screen').style.display = "flex";
        document.getElementById('info-surveillant').innerText = "Surveillant : " + surveillantActif;
    }

    function startScan() {
        document.getElementById('reader-container').style.display = 'block';
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess).catch(e => alert("Caméra bloquée"));
    }

    function onScanSuccess(decodedText) {
		const bip = document.getElementById('audio-bip');
		if (bip) {
			bip.currentTime = 0; // Remet le son au début si on scanne vite
			bip.play().catch(e => console.log("L'audio nécessite une interaction préalable"));
		}
		if (navigator.vibrate) navigator.vibrate(80);
		stopScan();
		
		const id = decodedText.trim().toUpperCase();
		const m = membresCache.find(x => x.id && x.id.toUpperCase() === id);
		
		if (m) {
			showResult(m);
			
			// 1. Envoi discret du log au serveur (Google Sheets)
			fetch(`${SCRIPT_URL}?code=${encodeURIComponent(id)}&surveillant=${encodeURIComponent(surveillantActif)}`, { mode: 'no-cors' });

			// 2. LOGIQUE DU COMPTEUR UNIQUE
			// On vérifie si cet ID est déjà présent dans notre Set (notre liste sans doublons)
			if (!presentsAujourdhui.has(id)) {
				// Si l'ID n'y est pas, on l'ajoute
				presentsAujourdhui.add(id);
				
				// Et on met à jour l'affichage avec la nouvelle taille de la liste
				const el = document.getElementById('nb-presents');
				if (el) {
					// On récupère la valeur actuelle et on fait +1
					let actuel = parseInt(el.innerText) || 0;
					el.innerText = actuel + 1;
				}
			} else {
				console.log("Membre " + id + " déjà compté comme présent aujourd'hui.");
			}
			
		} else if (id.includes("KAM")) {
			// Cas d'une nouvelle carte (formulaire d'inscription)
			showResult({ id: id, etat: "NOUVEAU" });
		} else {
			alert("Inconnu : " + id);
			startScan();
		}
	}
	
    function showResult(m) {
        const card = document.getElementById('result-card');
        card.innerHTML = "";
        if (m.etat === "NOUVEAU") {
            card.style.borderTop = "10px solid var(--primary)";
            card.innerHTML = `<h2>CARTE VIERGE</h2><p>ID: ${m.id}</p><input type="text" id="ins-prenom" class="input-inscription" placeholder="Prénom"><input type="text" id="ins-nom" class="input-inscription" placeholder="Nom"><button class="btn-save" onclick="sauvegarderMembre('${m.id}')">ENREGISTRER</button><button class="btn-next" style="background:#ccc;" onclick="closeCard()">ANNULER</button>`;
        } else {
            let color = "var(--error)";
            const et = (m.etat || "").toLowerCase();
            if (et === "actif") color = "var(--success)";
            if (et === "non-confirmé") color = "var(--warning)";
            card.style.borderTop = "10px solid " + color;
            card.innerHTML = `<h2>${m.prenom} ${m.nom}</h2><div class="badge" style="background:${color}">${(m.etat || "INCONNU").toUpperCase()}</div><p style="color:#888; font-family:monospace;">${m.id}</p><button class="btn-next" onclick="closeCard()">SUIVANT</button>`;
        }
        document.getElementById('overlay').style.display = "block";
        card.style.display = "block";
    }

    async function sauvegarderMembre(id) {
        const p = document.getElementById('ins-prenom').value.trim();
        const n = document.getElementById('ins-nom').value.trim();
        if (!p || !n) return alert("Champs vides");
        const btn = document.querySelector('.btn-save');
        btn.innerText = "Envoi..."; btn.disabled = true;
        try {
            const url = `${SCRIPT_URL}?action=inscrire&id=${encodeURIComponent(id)}&prenom=${encodeURIComponent(p)}&nom=${encodeURIComponent(n)}&surveillant=${encodeURIComponent(surveillantActif)}`;
            const resp = await fetch(PROXY + encodeURIComponent(url));
            const res = await resp.json();
            if (res.success) {
                membresCache.push({ id: id, prenom: p, nom: n, etat: "non-confirmé" });
                localStorage.setItem('membres_cache', JSON.stringify(membresCache));
                document.getElementById('result-card').innerHTML = `<div style="padding:20px; color:green; font-weight:bold;">✅ Enregistré !</div><button class="btn-next" onclick="closeCard()">CONTINUER</button>`;
            }
        } catch (e) { alert("Erreur réseau"); btn.innerText = "REESSAYER"; btn.disabled = false; }
    }

    function stopScan() { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('reader-container').style.display = 'none'); }
    function closeCard() { document.getElementById('overlay').style.display = 'none'; document.getElementById('result-card').style.display = 'none'; startScan(); }
</script>
</body>
</html>
