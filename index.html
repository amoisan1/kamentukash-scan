<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kamentukash Pro - Final</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --primary: #0056b3; --success: #2e7d32; --warning: #f39c12; --error: #d32f2f; 
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #d7e1ec 100%); 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-gradient); text-align: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Barres et Statuts */
        #status-bar { display: flex; align-items: center; justify-content: center; padding: 12px; background: white; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.85rem; font-weight: 600; position: sticky; top: 0; z-index: 10; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; margin-right: 8px; }
        .online { background: #4CAF50 !important; box-shadow: 0 0 8px #4CAF50; }

        /* Cartes et Design */
        .glass-card { background: rgba(255,255,255,0.95); padding: 30px 20px; border-radius: 25px; margin: 20px auto; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .input-inscription { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ced4da; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        /* Boutons */
        .btn-save { width: 100%; padding: 15px; border-radius: 15px; background: var(--success); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-scan { width: 180px; height: 180px; border-radius: 50%; background: var(--primary); color: white; border: 8px solid rgba(255,255,255,0.5); font-weight: bold; font-size: 1.1rem; box-shadow: 0 15px 35px rgba(0, 86, 179, 0.3); cursor: pointer; }
        .btn-next { width: 100%; padding: 18px; border-radius: 15px; background: #212529; color: white; border: none; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* Écrans */
        #login-screen { height: 85vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #home-screen { display: none; height: 80vh; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        /* Recherche */
        #search-trigger { margin-top: 15px; color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; padding: 10px; }
        .item-recherche { padding: 15px; border-bottom: 1px solid #eee; text-align: left; cursor: pointer; background: white; }
        .item-recherche:active { background: #f1f1f1; }

        /* Scanner & Modals */
        #reader-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; backdrop-filter: blur(8px); }
        #result-card, #search-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 350px; padding: 25px; border-radius: 30px; background: white; z-index: 210; text-align: center; }
        #search-modal { z-index: 300; max-height: 80vh; overflow-y: auto; }
        .badge { display: inline-block; padding: 12px 24px; border-radius: 15px; color: white; font-weight: bold; margin: 15px 0; text-transform: uppercase; }
    </style>
</head>
<body>

<audio id="audio-bip" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3" preload="auto"></audio>

<div id="status-bar">
    <div id="status-dot"></div> <span id="status-text">Initialisation...</span>
</div>

<div id="login-screen">
    <div class="glass-card">
        <h2 style="margin:0;">Bienvenue</h2>
        <p style="color: #666;">Qui est surveillant aujourd'hui ?</p>
        <select id="select-surveillant" class="select-style" style="width:100%; padding:12px; border-radius:10px; margin:15px 0;">
            <option value="">Chargement...</option>
        </select>
        <button class="btn-save" id="btn-entrer" onclick="validerSurveillant()" style="display:none; background:var(--primary);">ENTRER</button>
    </div>
</div>

<div id="home-screen">
    <div id="info-surveillant" style="background: white; padding: 10px 25px; border-radius: 50px; color: var(--primary); font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05);"></div>
    
    <div style="background: #e9ecef; padding: 10px 20px; border-radius: 15px; font-size: 0.9rem; color: #495057; font-weight: bold;">
        👥 Présents : <span id="nb-presents">0</span>
    </div>
    
    <button class="btn-scan" onclick="startScan()">📷<br><br>SCANNER</button>

    <div id="search-trigger" onclick="ouvrirRecherche()">
        <span>🔍</span> RECHERCHE MANUELLE
    </div>

    <p style="color: #6c757d; font-size: 0.8rem; margin-top:20px; text-decoration: underline; cursor: pointer;" onclick="resetSurveillant()">Changer de surveillant</p>
</div>

<div id="reader-container">
    <div id="reader" style="width: 100%; height: 100%;"></div>
    <button onclick="stopScan()" style="position:absolute; bottom:50px; left:50%; transform:translateX(-50%); padding:15px 40px; border-radius:50px; background:red; color:white; border:none; z-index:101; font-weight:bold;">ANNULER</button>
</div>

<div id="search-modal-overlay" class="overlay" onclick="fermerRecherche()"></div>
<div id="search-modal">
    <h3>Recherche Membre</h3>
    <input type="text" id="input-recherche" class="input-inscription" placeholder="Nom ou Prénom..." onkeyup="filtrerRecherche()">
    <div id="liste-resultats" style="max-height: 250px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 10px;"></div>
    <button class="btn-next" style="background:#ccc;" onclick="fermerRecherche()">RETOUR</button>
</div>

<div id="overlay" class="overlay"></div>
<div id="result-card"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwQOsi7pSMMQRN_Tyw24vHFHcmlCI6HH_6fz0N8kDw81jL_sq1AH0xXBrEbj-9shFte/exec";
    const PROXY = "https://api.codetabs.com/v1/proxy?quest=";

    let html5QrCode;
    let membresCache = [];
    let presentsAujourdhui = new Set();
    let surveillantActif = "";
	let fileAttenteScans = JSON.parse(localStorage.getItem('file_attente') || '[]');
	let isSyncing = false; // Le verrou : empêche de lancer deux synchros en même temps
	
    window.onload = initialiser;

    async function initialiser() {
		// --- 1. CHARGEMENT PRIORITAIRE DU CACHE (HORS-LIGNE) ---
		// On remplit les membres AVANT même de savoir s'il y a internet
		const localData = localStorage.getItem('membres_cache');
		if (localData) {
			membresCache = JSON.parse(localData);
			// On affiche un message rassurant dans la barre de statut
			document.getElementById('status-text').innerText = membresCache.length + " membres (Prêt - Local)";
			document.getElementById('status-dot').style.backgroundColor = "#ffa500"; // Orange = Mode Local
		}

		// --- 2. LOGIQUE DE LA LOUPE ET DU SURVEILLANT (TES RÉGLAGES) ---
		const searchTrigger = document.getElementById('search-trigger');
		if (searchTrigger) searchTrigger.style.display = 'flex'; 

		const garde = localStorage.getItem('surveillant_nom');
		if (garde && garde !== "") {
			surveillantActif = garde;
			document.getElementById('login-screen').style.display = "none";
			document.getElementById('home-screen').style.display = "flex";
			document.getElementById('info-surveillant').innerText = "Surveillant : " + surveillantActif;
		}

		// --- 3. TENTATIVE DE CONNEXION (SI RÉSEAU DISPONIBLE) ---
		try {
			const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?action=getSurveillants"));
			const data = await resp.json();
			const select = document.getElementById('select-surveillant');
			if (select) {
				select.innerHTML = '<option value="">-- Choisir --</option>';
				data.forEach(n => { 
					let o = document.createElement('option'); 
					o.value = n; o.innerText = n; 
					select.appendChild(o); 
				});
				document.getElementById('btn-entrer').style.display = "block";
			}
		} catch (e) { 
			console.log("Mode hors-ligne : Impossible de charger les surveillants");
		}

		// --- 4. SYNCHRONISATION EN ARRIÈRE-PLAN ---
		// Si internet est là, ça mettra à jour le cache. Sinon, on garde le local.
		syncMembres();
		traiterFileAttente(); // Envoie les scans restés bloqués la veille
	}

    async function syncMembres() {
        const txt = document.getElementById('status-text');
        try {
            const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?action=sync"));
            const data = await resp.json();
            if (data && data.membres) {
                membresCache = data.membres;
                localStorage.setItem('membres_cache', JSON.stringify(data.membres));
                
                // Init du Set de présence basé sur le chiffre serveur
                presentsAujourdhui = new Set();
                const nb = data.totalPresents || 0;
                for(let i=0; i<nb; i++) presentsAujourdhui.add("PRE_"+i); 
                
                document.getElementById('nb-presents').innerText = nb;
                txt.innerText = membresCache.length + " membres sync";
                document.getElementById('status-dot').classList.add('online');
            }
        } catch (e) { txt.innerText = "Mode Hors-ligne"; }
    }

    function validerSurveillant() {
        const val = document.getElementById('select-surveillant').value;
        if (!val) return alert("Choisis un nom");
        surveillantActif = val;
        localStorage.setItem('surveillant_nom', val);
        afficherHomeScreen();
    }

    function resetSurveillant() { localStorage.removeItem('surveillant_nom'); location.reload(); }

    function afficherHomeScreen() {
		// Cette fonction est appelée quand on valide manuellement
		document.getElementById('login-screen').style.display = "none";
		document.getElementById('home-screen').style.display = "flex";
		document.getElementById('info-surveillant').innerText = "Surveillant : " + surveillantActif;
		
		// On force la visibilité de la recherche ici aussi
		const st = document.getElementById('search-trigger');
		if (st) st.style.display = 'flex';
	}

    function startScan() {
        document.getElementById('reader-container').style.display = 'block';
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScanSuccess).catch(e => alert("Caméra bloquée"));
    }

    function onScanSuccess(decodedText) {
        // Bip et Vibration
        const bip = document.getElementById('audio-bip');
        if(bip) { bip.currentTime = 0; bip.play().catch(e => {}); }
        if (navigator.vibrate) navigator.vibrate(80);

        stopScan();
        const id = decodedText.trim().toUpperCase();
        const m = membresCache.find(x => x.id && x.id.toUpperCase() === id);

        if (m) {
            validerMembre(m);
        } else if (id.includes("KAM")) {
            showResult({ id: id, etat: "NOUVEAU" });
        } else {
            alert("Code inconnu");
            startScan();
        }
    }

    function validerMembre(m) {
		showResult(m);
		
		// On crée l'objet du scan
		const scanData = {
			code: m.id,
			surveillant: surveillantActif,
			timestamp: new Date().toISOString()
		};

		// On tente l'envoi intelligent
		envoyerScan(scanData);
		
		// Mise à jour du compteur local (ça, ça marche toujours)
		if (!presentsAujourdhui.has(m.id)) {
			presentsAujourdhui.add(m.id);
			document.getElementById('nb-presents').innerText = presentsAujourdhui.size;
		}
	}

    function ouvrirRecherche() {
        document.getElementById('search-modal-overlay').style.display = 'block';
        document.getElementById('search-modal').style.display = 'block';
        document.getElementById('input-recherche').focus();
        filtrerRecherche();
    }

    function fermerRecherche() {
        document.getElementById('search-modal-overlay').style.display = 'none';
        document.getElementById('search-modal').style.display = 'none';
    }

    function filtrerRecherche() {
        const val = document.getElementById('input-recherche').value.toLowerCase();
        const container = document.getElementById('liste-resultats');
        container.innerHTML = '';
        
        const res = membresCache.filter(m => m.prenom.toLowerCase().includes(val) || m.nom.toLowerCase().includes(val));
        
        res.forEach(m => {
            const div = document.createElement('div');
            div.className = 'item-recherche';
            div.innerHTML = `<strong>${m.prenom} ${m.nom}</strong><br><small>${m.id} | ${m.etat}</small>`;
            div.onclick = () => { fermerRecherche(); validerMembre(m); };
            container.appendChild(div);
        });
    }

    function showResult(m) {
        const card = document.getElementById('result-card');
        card.innerHTML = "";
        if (m.etat === "NOUVEAU") {
            card.style.borderTop = "10px solid var(--primary)";
            card.innerHTML = `<h2>CARTE VIERGE</h2><p>ID: ${m.id}</p><input type="text" id="ins-prenom" class="input-inscription" placeholder="Prénom"><input type="text" id="ins-nom" class="input-inscription" placeholder="Nom"><button class="btn-save" onclick="sauvegarderMembre('${m.id}')">ENREGISTRER</button><button class="btn-next" style="background:#ccc;" onclick="closeCard()">ANNULER</button>`;
        } else {
            let color = "var(--error)";
            const et = (m.etat || "").toLowerCase();
            if (et === "actif") color = "var(--success)";
            if (et === "non-confirmé") color = "var(--warning)";
            card.style.borderTop = "10px solid " + color;
            card.innerHTML = `<h2>${m.prenom} ${m.nom}</h2><div class="badge" style="background:${color}">${(m.etat || "INCONNU").toUpperCase()}</div><p style="color:#888;">${m.id}</p><button class="btn-next" onclick="closeCard()">SUIVANT</button>`;
        }
        document.getElementById('overlay').style.display = "block";
        card.style.display = "block";
    }

    async function sauvegarderMembre(id) {
        const p = document.getElementById('ins-prenom').value.trim();
        const n = document.getElementById('ins-nom').value.trim();
        if(!p || !n) return alert("Champs vides");
        const btn = document.querySelector('.btn-save');
        btn.innerText = "Envoi..."; btn.disabled = true;
        try {
            const url = `${SCRIPT_URL}?action=inscrire&id=${encodeURIComponent(id)}&prenom=${encodeURIComponent(p)}&nom=${encodeURIComponent(n)}&surveillant=${encodeURIComponent(surveillantActif)}`;
            await fetch(PROXY + encodeURIComponent(url));
            membresCache.push({ id: id, prenom: p, nom: n, etat: "non-confirmé" });
            localStorage.setItem('membres_cache', JSON.stringify(membresCache));
            card.innerHTML = `<div style="padding:20px; color:green; font-weight:bold;">✅ Enregistré !</div><button class="btn-next" onclick="closeCard()">CONTINUER</button>`;
        } catch (e) { alert("Terminé !"); closeCard(); }
    }

    function stopScan() { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('reader-container').style.display = 'none'); }
    function closeCard() { document.getElementById('overlay').style.display = 'none'; document.getElementById('result-card').style.display = 'none'; }
	async function envoyerScan(data) {
		const url = `${SCRIPT_URL}?code=${encodeURIComponent(data.code)}&surveillant=${encodeURIComponent(data.surveillant)}`;
		
		try {
			// Tentative d'envoi
			await fetch(PROXY + encodeURIComponent(url), { mode: 'no-cors' });
			
			// Si ça passe, on nettoie le message d'attente
			console.log("Scan envoyé !");
			updateStatusAttente();
		} catch (e) {
			// Si ça rate, on ajoute à la file (si pas déjà dedans)
			const existeDeja = fileAttenteScans.some(s => s.code === data.code && s.timestamp === data.timestamp);
			if (!existeDeja) {
				fileAttenteScans.push(data);
				localStorage.setItem('file_attente', JSON.stringify(fileAttenteScans));
			}
			updateStatusAttente();

			// On prévoit un essai automatique dans 30 secondes
			setTimeout(traiterFileAttente, 30000);
		}
	}

	async function traiterFileAttente() {
		// Si la liste est vide OU si on est déjà en train de synchroniser : on arrête
		if (fileAttenteScans.length === 0 || isSyncing) {
			updateStatusAttente();
			return;
		}

		isSyncing = true; // On ferme le verrou
		console.log("Début de la synchronisation forcée...");

		while (fileAttenteScans.length > 0) {
			const scan = fileAttenteScans[0];
			const url = `${SCRIPT_URL}?code=${encodeURIComponent(scan.code)}&surveillant=${encodeURIComponent(scan.surveillant)}`;

			try {
				// On tente l'envoi
				await fetch(PROXY + encodeURIComponent(url), { mode: 'no-cors' });
				
				// Succès ! On l'enlève de la liste locale
				fileAttenteScans.shift();
				localStorage.setItem('file_attente', JSON.stringify(fileAttenteScans));
				
				console.log("1 scan livré. Reste : " + fileAttenteScans.length);
				updateStatusAttente(); // On met à jour l'affichage à chaque succès
				
				// Petit délai pour laisser respirer le serveur
				await new Promise(resolve => setTimeout(resolve, 300)); 
				
			} catch (e) {
				console.log("Échec de connexion pendant la vidange. On arrête.");
				break; // On sort de la boucle si internet coupe
			}
		}

		isSyncing = false; // On rouvre le verrou à la fin
		updateStatusAttente();
	}

	function updateStatusAttente() {
		const txt = document.getElementById('status-text');
		const dot = document.getElementById('status-dot');

		if (fileAttenteScans.length > 0) {
			// Affichage ALERTE
			txt.innerHTML = `<b style="color:red;">☁️ ${fileAttenteScans.length} en attente</b>`;
			dot.style.backgroundColor = "#ff4444"; // Rouge flash pour dire "Attention pas encore envoyé"
		} else {
			// Retour au CALME
			txt.innerText = membresCache.length + " membres synchronisés";
			dot.style.backgroundColor = "#4CAF50"; // Vert
		}
	}
	// Détecteur automatique de retour d'internet
	window.addEventListener('online', () => {
		console.log("Internet est de retour ! Synchronisation...");
		traiterFileAttente(); 
	});
</script>
</body>
</html>
